name: Deploy

# Every push to main:
#   1. applies the database migrations (Supabase Management API)
#   2. builds + deploys restowner and the diner app to Cloudflare Pages
#   3. redeploys the vautcher-pass Supabase edge function
#
# Migrations run automatically — this is a DEV environment and every
# migration file is written to be idempotent (safe to re-run). For a
# production setup you would gate this behind a manual approval.
#
# Required GitHub repo secrets (set them with: bash set-ci-secrets.sh):
#   CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID, SUPABASE_ACCESS_TOKEN

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Hard rule (see ~/.claude memory no-native-dialogs): no native
  # window.confirm/alert/prompt calls in either app. This grep fails
  # the build if anyone reintroduces them, so cache-bust artefacts
  # from old bundles can't be the user's fault forever.
  no-native-dialogs:
    name: No native dialogs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan restowner/src + app/src
        run: |
          set -euo pipefail
          # Three passes — every one fails the build:
          #  1. Any `window.confirm/alert/prompt(` — unambiguous native call.
          #  2. Any bare `confirm/alert/prompt(` in a file that does NOT
          #     import useDialog — falls through to the window globals.
          #  3. Any bare `confirm/alert/prompt(` in a file that DOES import
          #     useDialog but doesn't destructure THAT NAME — the bug that
          #     just shipped a "[object Object]" dialog to production
          #     because AdminView destructured { alert } but called confirm().
          FILES=$(find restowner/src app/src \
            \( -name '*.vue' -o -name '*.js' -o -name '*.ts' \) \
            -not -path '*composables/useDialog*' \
            -not -path '*components/AppDialog*')

          HITS=""
          for f in $FILES; do
            # Pass 1 — window.<dialog>(
            H1=$(grep -nE '(^|[^a-zA-Z_.])window\.(confirm|alert|prompt)[[:space:]]*\(' "$f" || true)
            [ -n "$H1" ] && HITS="${HITS}${f}: window.X(...)\n${H1}\n"

            # Determine which names this file calls bare (not method/prop).
            CALLED=$(grep -oE '(^|[^a-zA-Z_.])(confirm|alert|prompt)[[:space:]]*\(' "$f" \
              | grep -oE '(confirm|alert|prompt)\b' | sort -u || true)
            [ -z "$CALLED" ] && continue

            if grep -q 'useDialog' "$f"; then
              # Pass 3 — file uses useDialog. Extract the destructured names
              # from `const {...} = useDialog()` and require each CALLED name
              # to appear in that set.
              DEST=$(grep -oE 'const[[:space:]]*\{[^}]+\}[[:space:]]*=[[:space:]]*useDialog\(\)' "$f" \
                | grep -oE '\{[^}]+\}' | tr -d '{}' | tr ',' '\n' \
                | awk '{print $1}' | tr -d ' ' | sort -u || true)
              MISSING=""
              for c in $CALLED; do
                if ! echo "$DEST" | grep -qx "$c"; then
                  MISSING="$MISSING $c"
                fi
              done
              if [ -n "$MISSING" ]; then
                LINES=$(grep -nE "(^|[^a-zA-Z_.])($(echo $MISSING | tr ' ' '|'))[[:space:]]*\(" "$f" || true)
                HITS="${HITS}${f}: imports useDialog but does not destructure [${MISSING# }] — these calls hit window.<X>(...)\n${LINES}\n"
              fi
            else
              # Pass 2 — no useDialog import; every bare call is native.
              LINES=$(grep -nE "(^|[^a-zA-Z_.])($(echo $CALLED | tr ' ' '|'))[[:space:]]*\(" "$f" \
                | grep -vE '\.alert\(|\.confirm\(|\.prompt\(' || true)
              [ -n "$LINES" ] && HITS="${HITS}${f}: bare call, no useDialog import\n${LINES}\n"
            fi
          done

          if [ -n "$HITS" ]; then
            echo "::error::Native dialog calls found — fix by destructuring from useDialog():"
            printf "%b" "$HITS"
            exit 1
          fi
          echo "✓ no native dialog calls."

  migrate:
    name: Apply database migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply SQL migrations (idempotent)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          REF=yfyfoqrautdogivalimb
          # Idempotent add-on migrations, applied in dependency order.
          # Add new migration files to this list as the schema grows.
          for f in \
            restowner/supabase/storage.sql \
            restowner/supabase/rebate-schema.sql \
            restowner/supabase/prefs-schema.sql \
            restowner/supabase/points-schema.sql \
            restowner/supabase/moderation-schema.sql \
            restowner/supabase/root-admin-schema.sql \
            restowner/supabase/moderation-trust-fix.sql \
            restowner/supabase/admin-client-scope.sql \
            restowner/supabase/my-restaurants.sql \
            restowner/supabase/restaurant-clients.sql \
            restowner/supabase/event-attendees.sql \
            restowner/supabase/scaffold-fields.sql \
            restowner/supabase/scaffold-owner.sql \
            restowner/supabase/admin-restaurants-claim.sql \
            restowner/supabase/admin-restaurants-source.sql \
            restowner/supabase/delete-restaurant.sql \
            restowner/supabase/root-account-schema.sql \
            restowner/supabase/owner-stats.sql \
            restowner/supabase/voucher-schema.sql \
            restowner/supabase/event-capacity-schema.sql \
            restowner/supabase/restaurant-config-schema.sql \
            restowner/supabase/restaurant-admin-schema.sql \
            restowner/supabase/push-schema.sql \
            restowner/supabase/push-vault-schema.sql \
            restowner/supabase/events-recurrence-schema.sql \
            restowner/supabase/event-recurrence-pattern.sql \
            restowner/supabase/event-end-time.sql \
            restowner/supabase/event-push-now.sql \
            restowner/supabase/owner-claim-schema.sql \
            restowner/supabase/scaffold-tier.sql \
            restowner/supabase/admin-restaurants-tier.sql \
            restowner/supabase/admin-set-template.sql \
            app/supabase/pass-schema.sql \
            restowner/supabase/api-grants.sql; do
            echo "→ applying $f"
            jq -Rs '{query: .}' "$f" \
              | curl -sS -X POST "https://api.supabase.com/v1/projects/$REF/database/query" \
                  -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
                  -H "Content-Type: application/json" --data @- \
              | jq -e 'if (type=="object" and has("message")) then error(.message) else true end' >/dev/null
            echo "  ok"
          done

  restowner:
    name: Build & deploy restowner
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: restowner
      - run: npm run build
        working-directory: restowner
        # .env is gitignored, so Vite gets its public Supabase config here.
        env:
          VITE_SUPABASE_URL: https://yfyfoqrautdogivalimb.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_CucZIIP9fzY-AN5ChPQGlQ_vWfmeTAR
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy restowner/dist --project-name=restowner --branch=main --commit-dirty=true --commit-message=deploy-${{ github.sha }}

  diner-app:
    name: Build & deploy diner app
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: app
      - run: npm run build
        working-directory: app
        # .env is gitignored, so Vite gets its public Supabase config here.
        env:
          VITE_SUPABASE_URL: https://yfyfoqrautdogivalimb.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_CucZIIP9fzY-AN5ChPQGlQ_vWfmeTAR
          # VAPID public key — pairs with VAPID_PRIVATE_KEY secret on the
          # event-notifier edge function. Public by design (sent to the
          # browser to identify this sender to the push service).
          VITE_VAPID_PUBLIC_KEY: BH2S3bUsxSCSP822MfhmI1QMty7XXcXxZ-JCsxC3ph1-45MSCJgdSSpv6i9XGQAjXCeao7gmCPRKsKBD_5aZCHw
      - name: Deploy to Cloudflare Pages (la-gioconda)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy app/dist --project-name=la-gioconda --branch=main --commit-dirty=true --commit-message=deploy-${{ github.sha }}
      - name: Deploy to Cloudflare Pages (la-gioconda-restaurant)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy app/dist --project-name=la-gioconda-restaurant --branch=main --commit-dirty=true --commit-message=deploy-${{ github.sha }}

  edge-function:
    name: Deploy vautcher-pass edge function
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy edge functions
        working-directory: app
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy vautcher-pass --project-ref yfyfoqrautdogivalimb
          supabase functions deploy provision-owner --project-ref yfyfoqrautdogivalimb
          supabase functions deploy event-notifier --project-ref yfyfoqrautdogivalimb
          supabase functions deploy rephrase-text --project-ref yfyfoqrautdogivalimb
          supabase functions deploy claim-owner --project-ref yfyfoqrautdogivalimb
          supabase functions deploy scaffold-tenant --project-ref yfyfoqrautdogivalimb
          supabase functions deploy delete-tenant --project-ref yfyfoqrautdogivalimb
