name: Deploy

# Every push to main builds and deploys the apps to Cloudflare Pages and
# redeploys the Supabase edge function.
#
# NOTE: database migrations are intentionally NOT auto-applied — running
# DDL on every push is risky. When the schema changes, apply it with the
# deploy-*.sh scripts (or the SQL files) deliberately.
#
# Required GitHub repo secrets (set them with: bash set-ci-secrets.sh):
#   CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID, SUPABASE_ACCESS_TOKEN

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  restowner:
    name: Build & deploy restowner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: restowner
      - run: npm run build
        working-directory: restowner
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy restowner/dist --project-name=restowner --branch=main

  diner-app:
    name: Build & deploy diner app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: app
      - run: npm run build
        working-directory: app
      - name: Deploy to Cloudflare Pages (la-gioconda)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy app/dist --project-name=la-gioconda --branch=main
      - name: Deploy to Cloudflare Pages (la-gioconda-restaurant)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy app/dist --project-name=la-gioconda-restaurant --branch=main

  edge-function:
    name: Deploy vautcher-pass edge function
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy edge function
        working-directory: app
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy vautcher-pass --project-ref yfyfoqrautdogivalimb
