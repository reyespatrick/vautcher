# Per-tenant diner-app deploy.
# Manually triggered: pick a slug, the workflow reads that tenant's
# config from Supabase, builds the diner app with its env vars + logo,
# and publishes it to <slug>.pages.dev.
name: Deploy tenant

on:
  workflow_dispatch:
    inputs:
      slug:
        description: 'Tenant slug (e.g. la-gioconda, bella-vista)'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install app deps
        working-directory: app
        run: npm ci
      - name: Build + deploy tenant
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bash deploy-tenant.sh "${{ inputs.slug }}"

      # Update the row so restowner's UI can stop polling.
      - name: Mark restaurant row as deployed
        if: success()
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          REF=yfyfoqrautdogivalimb
          SLUG='${{ inputs.slug }}'
          ESC_SLUG="${SLUG//\'/\'\'}"
          SQL="update public.vautcher_restaurants
                  set deploy_status = 'success',
                      deployed_at = now()
                where slug = '${ESC_SLUG}';"
          jq -Rs '{query: .}' <<<"$SQL" \
            | curl -sS -X POST "https://api.supabase.com/v1/projects/$REF/database/query" \
                -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
                -H "Content-Type: application/json" --data @-

      - name: Mark restaurant row as failed
        if: failure()
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          REF=yfyfoqrautdogivalimb
          SLUG='${{ inputs.slug }}'
          LOG_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          ESC_SLUG="${SLUG//\'/\'\'}"
          ESC_LOG="${LOG_URL//\'/\'\'}"
          SQL="update public.vautcher_restaurants
                  set deploy_status = 'failed',
                      deploy_log_url = '${ESC_LOG}'
                where slug = '${ESC_SLUG}';"
          jq -Rs '{query: .}' <<<"$SQL" \
            | curl -sS -X POST "https://api.supabase.com/v1/projects/$REF/database/query" \
                -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
                -H "Content-Type: application/json" --data @-
