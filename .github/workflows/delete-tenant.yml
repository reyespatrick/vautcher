# Per-tenant cleanup. Called from the scaffold-tenant edge function
# right after the DB-side delete. Removes the Cloudflare Pages project
# for the slug so its URL stops resolving.
name: Delete tenant

on:
  workflow_dispatch:
    inputs:
      slug:
        description: 'Tenant slug (kept for backwards compatibility / reserved-name guard)'
        required: true
        type: string
      project_name:
        description: 'Actual Cloudflare Pages project to delete. Optional; falls back to slug when omitted. Use this when the deployed project name differs from the slug (e.g. inglewood -> inglewood-353).'
        required: false
        type: string

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - name: Delete Cloudflare Pages project
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          SLUG='${{ inputs.slug }}'
          PROJECT='${{ inputs.project_name }}'
          [ -z "$PROJECT" ] && PROJECT="$SLUG"
          # Reserved tenants we never want a script to nuke by accident.
          case "$SLUG" in
            la-gioconda|la-gioconda-restaurant|restowner)
              echo "::error::refusing to delete reserved tenant '$SLUG'"
              exit 1
              ;;
          esac
          echo "→ deleting Cloudflare Pages project: $PROJECT (slug=$SLUG)"
          URL="https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/${PROJECT}"
          RES=$(curl -sS -X DELETE "$URL" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json")
          echo "$RES" | jq .
          OK=$(echo "$RES" | jq -r '.success')
          if [ "$OK" != "true" ]; then
            # 404 (project never existed) is treated as a success — the
            # tenant might have been deleted before its first deploy.
            CODE=$(echo "$RES" | jq -r '.errors[0].code // empty')
            if [ "$CODE" = "8000007" ] || [ "$CODE" = "1004" ] || echo "$RES" | grep -qi "not found"; then
              echo "Pages project not found — treating as already gone."
              exit 0
            fi
            exit 1
          fi
