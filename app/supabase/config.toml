project_id = "yfyfoqrautdogivalimb"

# vautcher-pass serves Apple/Safari, which send no Supabase JWT — the
# function does its own per-route auth, so JWT verification is off.
[functions.vautcher-pass]
verify_jwt = false

# provision-owner is called by a signed-in root user — require a JWT;
# the function additionally checks the caller is a moderator.
[functions.provision-owner]
verify_jwt = true

# event-notifier is called by pg_cron and DB triggers without a user
# JWT; it gates itself on the CRON_SECRET header instead.
[functions.event-notifier]
verify_jwt = false

# scaffold-tenant is called from restowner's admin UI by a signed-in
# moderator. JWT is required; the function additionally re-checks the
# caller is in vautcher_moderators server-side before inserting.
[functions.scaffold-tenant]
verify_jwt = true

# delete-tenant — same gating model as scaffold-tenant. The DB RPC
# also requires the moderator to pass the slug back as confirmation.
[functions.delete-tenant]
verify_jwt = true

# rephrase-text — "improve my description with AI" from the event editor.
# JWT required; the function also checks the caller is an owner/moderator
# before spending an Anthropic call.
[functions.rephrase-text]
verify_jwt = true

# claim-owner — a restaurateur activates with their durable code on the
# public /activer page. No JWT (they aren't signed in yet); the unguessable
# claim code is the secret.
[functions.claim-owner]
verify_jwt = false
