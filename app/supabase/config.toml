project_id = "yfyfoqrautdogivalimb"

# vautcher-pass serves Apple/Safari, which send no Supabase JWT — the
# function does its own per-route auth, so JWT verification is off.
[functions.vautcher-pass]
verify_jwt = false

# provision-owner is called by a signed-in root user — require a JWT;
# the function additionally checks the caller is a moderator.
[functions.provision-owner]
verify_jwt = true

# event-notifier is called by pg_cron and DB triggers without a user
# JWT; it gates itself on the CRON_SECRET header instead.
[functions.event-notifier]
verify_jwt = false

# scaffold-tenant accepts two callers: a signed-in moderator from
# restowner's admin UI (JWT) AND scaffold-queue-advance (X-Cron-Secret
# only — no JWT, because pg_cron / inter-function calls have nowhere
# to get one). The function does its own auth (moderator JWT OR cron
# secret), so the gateway gate is OFF — without this, the X-Cron-Secret
# bypass in the handler was never reached and every queued scaffold
# 401'd at the gateway.
[functions.scaffold-tenant]
verify_jwt = false

# delete-tenant — same gating model as scaffold-tenant. The DB RPC
# also requires the moderator to pass the slug back as confirmation.
[functions.delete-tenant]
verify_jwt = true

# rephrase-text — "improve my description with AI" from the event editor.
# JWT required; the function also checks the caller is an owner/moderator
# before spending an Anthropic call.
[functions.rephrase-text]
verify_jwt = true

# claim-owner — a restaurateur activates with their durable code on the
# public /activer page. No JWT (they aren't signed in yet); the unguessable
# claim code is the secret.
[functions.claim-owner]
verify_jwt = false

# notify-scaffold — pushes the admin who scaffolded a site when it goes
# live. Called by a DB trigger with the cron secret; no user JWT.
[functions.notify-scaffold]
verify_jwt = false

# notify-owner-approved — pushes an owner when root approves their access.
# Called by a DB trigger with the cron secret; no user JWT.
[functions.notify-owner-approved]
verify_jwt = false

# scaffold-queue-advance — called by pg_cron (no JWT) once a minute and
# by root from the Discover page (root JWT) after enqueueing a batch.
# The function does its own auth (cron secret OR root JWT), so the
# gateway gate must be OFF for the pg_cron path to reach the handler.
[functions.scaffold-queue-advance]
verify_jwt = false

# osm-website-search — called only from the browser (Découvrir page) by
# a signed-in root user. JWT required.
[functions.osm-website-search]
verify_jwt = true

# stripe-checkout — called from restowner's Abonnement page by a signed-in
# owner. JWT required; the function resolves the caller's restaurant via
# vautcher_owners.
[functions.stripe-checkout]
verify_jwt = true

# stripe-portal — same gating as stripe-checkout. Owner must be signed in.
[functions.stripe-portal]
verify_jwt = true

# stripe-webhook — Stripe calls us directly with no Supabase JWT. The
# function verifies the request itself via the Stripe-Signature header
# (HMAC over the raw body with STRIPE_WEBHOOK_SECRET). Gateway gate OFF.
[functions.stripe-webhook]
verify_jwt = false
